spring:
  application:
    name: switchwon-dev-be-homework
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

exchange-rate:
  initial-collection:
    enabled: true
  collection:
    providers: EXCHANGE_RATE_API,FRANKFURTER,MOCK
  rate-freshness-minutes: 5
  spread-buy: 1.05
  spread-sell: 0.95
  sanity-check:
    warn-threshold: 0.05
    skip-threshold: 0.15
  schedule:
    fixed-delay: 60000
    initial-delay: 60000
  providers:
    exchange-rate-api:
      base-url: https://v6.exchangerate-api.com/v6
      api-key: ${EXCHANGE_RATE_API_KEY:1e684ecef600734c8239ff5d}
      request-url: ${exchange-rate.providers.exchange-rate-api.base-url}/${exchange-rate.providers.exchange-rate-api.api-key}/latest/USD
    frankfurter:
      request-url: https://api.frankfurter.dev/v1/latest?base=USD&symbols=KRW,JPY,CNY,EUR
